services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eidolon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eidolon
      POSTGRES_USER: eidolon
      POSTGRES_PASSWORD: eidolon_dev_password
    ports:
      - "5432:5432"
    volumes:
      - eidolon_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eidolon -d eidolon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eidolon_pgdata:
